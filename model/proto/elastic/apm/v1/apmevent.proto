syntax = "proto3";

package elastic.apm.v1;

import "elastic/apm/v1/agent.proto";
import "elastic/apm/v1/client.proto";
import "elastic/apm/v1/cloud.proto";
import "elastic/apm/v1/code.proto";
import "elastic/apm/v1/container.proto";
import "elastic/apm/v1/datastream.proto";
import "elastic/apm/v1/destination.proto";
import "elastic/apm/v1/device.proto";
import "elastic/apm/v1/error.proto";
import "elastic/apm/v1/event.proto";
import "elastic/apm/v1/faas.proto";
import "elastic/apm/v1/host.proto";
import "elastic/apm/v1/http.proto";
import "elastic/apm/v1/kubernetes.proto";
import "elastic/apm/v1/labels.proto";
import "elastic/apm/v1/log.proto";
import "elastic/apm/v1/metricset.proto";
import "elastic/apm/v1/network.proto";
import "elastic/apm/v1/observer.proto";
import "elastic/apm/v1/process.proto";
import "elastic/apm/v1/service.proto";
import "elastic/apm/v1/session.proto";
import "elastic/apm/v1/source.proto";
import "elastic/apm/v1/span.proto";
import "elastic/apm/v1/system.proto";
import "elastic/apm/v1/trace.proto";
import "elastic/apm/v1/transaction.proto";
import "elastic/apm/v1/url.proto";
import "elastic/apm/v1/user.proto";
import "elastic/apm/v1/useragent.proto";

option go_package = "github.com/elastic/apm-data/model/modelpb";

message APMEvent {
  // nanoseconds since epoch
  uint64 timestamp = 1;
  Span span = 2;
  map<string, NumericLabelValue> numeric_labels = 3;
  map<string, LabelValue> labels = 4;
  Transaction transaction = 5;
  Metricset metricset = 6;
  Error error = 7;
  Cloud cloud = 8;
  Service service = 9;
  Faas faas = 10;
  Network network = 11;
  Container container = 12;
  User user = 13;
  Device device = 14;
  Kubernetes kubernetes = 15;
  Observer observer = 16;
  DataStream data_stream = 17;
  Agent agent = 18;
  HTTP http = 19;
  UserAgent user_agent = 20;
  // parent_id holds an optional parent span/transaction ID.
  string parent_id = 21;
  string message = 22;
  Trace trace = 23;
  Host host = 24;
  URL url = 25;
  Log log = 26;
  Source source = 27;
  Client client = 28;
  // child_ids holds an optional set of child span IDs. This is used for exotic
  // use cases where the parent knows the child ID, but the child does not know
  // the parent ID; namely for profiler-inferred spans.
  repeated string child_ids = 29;
  Destination destination = 30;
  Session session = 31;
  Process process = 32;
  Event event = 33;
  Code code = 34;
  System system = 35;
}
